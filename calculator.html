<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>calculator</title>
    <link rel="stylesheet" href="index.css"/>
    <link rel="stylesheet" href="calculator.css"/>
    <script src="calculator.js"></script>
  </head>
  <body>
    <div class="bg_pattern Paper_v2""></div>
    <!-- <center><h1>たのしい電卓</h1></center> -->
        <!-- <center> -->
        <!-- ボタンの作成 -->
        <form name="calculator">

        <input type="text" id="input" value="0" size="15" readonly disabled>
        <input type="Button" value="コピー" onClick="CopyValue()" style="width: 60px; height: 40px; font-size: 12px; background-color: #fff; cursor: pointer; border-radius: 0px; color: #000;"><br>
        <input type="button" value="1" onClick="AppendValue(this)">
        <input type="button" value="2" onClick="AppendValue(this)">
        <input type="button" value="3" onClick="AppendValue(this)">
        <input type="radio" id="plus" value="+" onClick="AppendSymbol(this)" name="symbol" class="SymbolButton">
        <label for="plus">＋</label>
        <br> 
        <input type="button" value="4" onClick="AppendValue(this)">
        <input type="button" value="5" onClick="AppendValue(this)">
        <input type="button" value="6" onClick="AppendValue(this)">
        <input type="radio" id="minus" value="-" onClick="AppendSymbol(this)" name="symbol" class="SymbolButton">
        <label for="minus">－</label>
        <br>
        <input type="button" value="7" onClick="AppendValue(this)">
        <input type="button" value="8" onClick="AppendValue(this)">
        <input type="button" value="9" onClick="AppendValue(this)">
        <input type="radio" id="multiply" value="*" onClick="AppendSymbol(this)" name="symbol" class="SymbolButton">
        <label for="multiply">×</label>
        <br>
        <input type="button" value="0" onClick="AppendZero()">
        <input type="button" value="00" onClick="AppendZeroZero()">
        <input type="button" value="." onClick="DecimalValue(this)">
        <input type="radio" id="divide" value="/" onClick="AppendSymbol(this)" name="symbol" class="SymbolButton">
        <label for="divide">÷</label>
        <br>
        <input type="button" value="±" onClick="PlusMinusValue()" > 
        <input type="button" value="%" onClick="PercentageValue()" >
        <input type="button" value="√" onClick="SquareRootValue()" > 
        <input type="button" value="=" onClick="PressEqual()"  style="border-radius: 10px; height:140px; position: absolute; left: 332px; top: 388px;">
        <br>
        <input type="button" value="C" onClick="ClearValue()" class="ClearButton" style="width:140px">
        <input type="button" value="CE" onClick="ClearEntry()" class="ClearButton">
        <br><input type="text" id="v" value="" size="15" readonly disabled>
    </form>
        <!-- </center> -->
        <div class="HowToUse">
            基本の使い方
            <ul>
                <li>最初に数字を入力</li>
                <li>次に演算子（＋、－、×、÷）を入力</li>
                <li>最後にイコールを入力</li>
                <li>クリアボタンを押すと電卓をリセット</li>
            </ul>
                その他の記号
            <ul>
                <li>±：プラスマイナスの反転</li>
                <li>％：パーセントの計算</li>
                <li>√：平方根の計算</li>
                <li>C：電卓をリセット</li>
                <li>CE：入力をクリア</li>
            </ul>
            コピーボタンを押すと表示されている値をクリップボードにコピーできます
        </div>
  </body>
</html>
