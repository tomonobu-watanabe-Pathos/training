<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css"/>
    <script src="calculator.js"></script>
  </head>
  <body>
    <center><h1>たのしい電卓</h1></center>
        <center>
        <!-- ボタンの作成 -->
        <form name="calculator">
        <input type="text" id="input" value="0" size="15" readonly disabled><br><br>
        <input type="button" value="1" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="2" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="3" onClick="AppendValue(this)" class="NumberButton"> 
        &ensp; <input type="radio" id="plus" value="＋" onClick="AppendSymbol(this)" name="symbol">
        <label for="plus">＋</label><br>
        <input type="button" value="4" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="5" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="6" onClick="AppendValue(this)" class="NumberButton"> &ensp; <input type="radio" name="symbol" value="－" onClick="AppendSymbol(this)" class="SymbolButton"> <br>
        <input type="button" value="7" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="8" onClick="AppendValue(this)" class="NumberButton">
        <input type="button" value="9" onClick="AppendValue(this)" class="NumberButton"> &ensp; <input type="radio" name="symbol" value="×" onClick="AppendSymbol(this)" class="SymbolButton"> <br>
        <input type="button" value="0" onClick="AppendZero()" class="NumberButton">
        <input type="button" value="00" onClick="AppendZeroZero()" class="NumberButton">
        <input type="button" value="." onClick="DecimalValue(this)" class="NumberButton">&ensp; <input type="radio" name="symbol" value="÷" onClick="AppendSymbol(this)" class="SymbolButton"> <br>
        <input type="button" value="±" onClick="PlusMinusValue()" class="NumberButton"> 
        
        <input type="button" value="%" onClick="PercentageValue()" class="NumberButton">
        <input type="button" value="√" onClick="SquareRootValue()" class="NumberButton"> &ensp; <input type="button" value="=" onClick="CalculateValue()" class="NumberButton"> <br>
        <input type="button" value="C" onClick="ClearValue()" class="ClearButton" style="background-color: yellow;">
        </form>
        </center>
  </body>
</html>
